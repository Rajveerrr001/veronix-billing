<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

</head>

<body>

<header>
VERONIX.CLOTHING - Products
</header>

<div class="container">

<h2>Add New Product</h2>

<input id="product_name" placeholder="Product Name">

<select id="category">
<option>Clothing</option>
<option>Shoes</option>
<option>Perfume</option>
<option>Cap</option>
<option>Belt</option>
</select>

<input id="brand" placeholder="Brand">
<input id="size" placeholder="Size">
<input id="color" placeholder="Color">

<input id="purchase_price" type="number" placeholder="Purchase Price">
<input id="selling_price" type="number" placeholder="Selling Price">
<input id="stock_qty" type="number" placeholder="Stock Quantity">

<button onclick="alert('Button Working'); addProduct();">
Add Product
</button>

<p id="message"></p>

<script>

async function addProduct() {
  const product_name = document.getElementById("product_name").value;
const category = document.getElementById("category").value;
const brand = document.getElementById("brand").value;
const size = document.getElementById("size").value;
const color = document.getElementById("color").value;
const purchase_price = Number(document.getElementById("purchase_price").value);
const selling_price = Number(document.getElementById("selling_price").value);
const stock_qty = Number(document.getElementById("stock_qty").value);

const { error } = await supabaseClient
.from("products")
.insert([
{
product_name,
category,
brand,
size,
color,
purchase_price,
selling_price,
stock_qty
}
]);

if (error) {
document.getElementById("message").innerText = error.message;
} else {
document.getElementById("message").innerText = "Product Saved Successfully";
}
